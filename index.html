<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduManage Pro — نظام إدارة المدارس</title>
  <meta name="description" content="نظام إدارة المدارس المتكامل - School Management System">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app"></div>
  <div class="loading-screen" id="loading-screen">
    <div class="loader-container">
      <div class="loader-ring"></div>
      <h2 class="loader-title">EduManage Pro</h2>
      <p class="loader-subtitle">جاري التحميل...</p>
    </div>
  </div>
  <div id="toast-container"></div>
  <div id="modal-overlay" class="modal-overlay hidden"></div>
  <div id="confirm-dialog" class="confirm-dialog hidden"></div>

  <div id="image-viewer" class="image-viewer-modal">
    <div class="image-viewer-content">
      <button class="close-viewer" onclick="this.parentElement.parentElement.classList.remove('active')">&times;</button>
      <img id="viewer-img" src="" alt="Viewer">
      <div class="image-viewer-actions" id="viewer-actions"></div>
    </div>
  </div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
